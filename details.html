<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Match Details</title>
        <link rel="stylesheet" href="styles.css" />
        <link rel="stylesheet" href="details.css" />
    </head>
    <body>
        <header>
            <h1>MatchScore</h1>
            <nav>
                <a href="index.html">Sports</a>
                <a href="scores.html">Live Scores</a>
                <a href="details.html">Details</a>
            </nav>
        </header>

        <main>
            <a href="scores.html" class="back-link">← Back to Scores</a>

            <div class="detail-card">
                <span class="sport-tag">FOOTBALL</span>
                <h2>Match Details</h2>

                <div class="big-score">
                    <div class="team-name">Arsenal</div>
                    <div>2 - 1</div>
                    <div class="team-name">Chelsea</div>
                </div>

                <div class="match-info">
                    <div class="info-row">
                        <span>Stadium</span>
                        <span>Emirates Stadium</span>
                    </div>
                    <div class="info-row">
                        <span>Referee</span>
                        <span>Michael Oliver</span>
                    </div>
                    <div class="info-row">
                        <span>Attendance</span>
                        <span>60,200</span>
                    </div>
                    <div class="info-row">
                        <span>Weather</span>
                        <span>Clear, 18°C</span>
                    </div>
                </div>
            </div>
        </main>

        <footer>&copy; MatchScore</footer>
    </body>
</html>
