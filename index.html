<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MatchScore</title>
        <link rel="stylesheet" href="styles.css" />
        <link rel="stylesheet" href="index.css" />
    </head>

    <body>
        <header>
            <h1>MatchScore</h1>
            <nav>
                <a href="index.html">Sports</a>
                <a href="scores.html">Live Scores</a>
                <a href="favorites.html">Favorites</a>
            </nav>
        </header>

        <main>
            <h2>Select a Sport</h2>

            <div class="sport-grid">
                <button class="sport-btn" data-sport="nfl">NFL</button>
                <button class="sport-btn" data-sport="nba">NBA</button>
                <button class="sport-btn" data-sport="mlb">MLB</button>
                <button class="sport-btn" data-sport="nhl">NHL</button>
                <button class="sport-btn" data-sport="college-football">
                    COLLEGE FOOTBALL
                </button>
            </div>
        </main>

        <footer>&copy; MatchScore</footer>

        <script>
            document.querySelectorAll(".sport-btn").forEach((btn) => {
                btn.addEventListener("click", () => {
                    localStorage.setItem("sport", btn.dataset.sport);
                    window.location.href = "scores.html";
                });
            });
        </script>
    </body>
</html>
