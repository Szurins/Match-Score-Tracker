<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Live Scores</title>
        <link rel="stylesheet" href="styles.css" />
        <link rel="stylesheet" href="scores.css" />
    </head>
    <body>
        <header>
            <h1>MatchScore</h1>
            <nav>
                <a href="index.html">Sports</a>
                <a href="scores.html">Live Scores</a>
                <a href="details.html">Details</a>
            </nav>
        </header>

        <main>
            <h2>Live Matches</h2>
            <div class="match-container">
                <div class="match-tile">
                    <div class="match-header">
                        <span>FOOTBALL</span>
                        <span>75'</span>
                    </div>
                    <div class="teams">
                        <div class="team">Arsenal</div>
                        <div class="score">2 - 1</div>
                        <div class="team">Chelsea</div>
                    </div>
                    <div class="match-actions">
                        <button class="fav-btn" title="Add to Favorites">
                            ★
                        </button>
                        <a href="details.html" class="view-btn">Details</a>
                    </div>
                </div>
                <div class="match-tile">
                    <div class="match-header">
                        <span>NBA</span>
                        <span>Q3</span>
                    </div>
                    <div class="teams">
                        <div class="team">Lakers</div>
                        <div class="score">88 - 92</div>
                        <div class="team">Warriors</div>
                    </div>
                    <div class="match-actions">
                        <button class="fav-btn" title="Add to Favorites">
                            ★
                        </button>
                        <a href="details.html" class="view-btn">Details</a>
                    </div>
                </div>
                <div class="match-tile">
                    <div class="match-header">
                        <span>FORMULA-1</span>
                        <span>Lap 45/60</span>
                    </div>
                    <div class="teams">
                        <div class="team">Verstappen</div>
                        <div class="score">1st</div>
                        <div class="team">Hamilton</div>
                    </div>
                    <div class="match-actions">
                        <button class="fav-btn" title="Add to Favorites">
                            ★
                        </button>
                        <a href="details.html" class="view-btn">Details</a>
                    </div>
                </div>
            </div>
        </main>

        <footer>&copy; MatchScore</footer>
    </body>
</html>
